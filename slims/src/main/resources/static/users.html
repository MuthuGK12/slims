<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLIMS User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container mt-4">

    <div class="header-section">
        <h2>SLIMS - User Management</h2>
        <p>Create, Update and Manage Users</p>
    </div>

    <div id="message"></div>

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            User Form
        </div>

        <div class="card-body">

            <form id="userForm">

                <input type="hidden" id="userId">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Employee Code</label>
                        <input type="text"
                               id="employeeCode"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>First Name</label>
                        <input type="text"
                               id="firstName"
                               class="form-control"
                               required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Last Name</label>
                        <input type="text"
                               id="lastName"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email"
                               id="email"
                               class="form-control"
                               required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Password</label>
                        <input type="password"
                               id="password"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Role</label>

                        <select id="role"
                                class="form-select">

                            <option value="ADMIN">ADMIN</option>
                            <option value="ANALYST">ANALYST</option>
                            <option value="QC_MANAGER">QC_MANAGER</option>

                        </select>

                    </div>

                </div>

                <button class="btn btn-success">
                    Save User
                </button>

                <button type="button"
                        class="btn btn-secondary"
                        onclick="clearForm()">
                    Clear
                </button>

            </form>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <div class="row">

                <div class="col-md-6">
                    User List
                </div>

                <div class="col-md-6">

                    <input type="text"
                           id="searchInput"
                           class="form-control"
                           placeholder="Search User..."
                           onkeyup="searchUsers()">

                </div>

            </div>

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Employee Code</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Active</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="userTableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="users.js"></script>

</body>
</html>
